<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- HTML Meta Tags -->
    <title>Gamer Journal — Wishlist</title>
    <meta name="description"
        content="Wishlist of your favorites video games. To add or remove games from your wishlist, click the heart icon on the game card.">
    <meta name="author" content="Yamsir Hernandez">

    <link rel="stylesheet" href="src/css/normalize.css" />
    <link rel="stylesheet" href="src/css/main.css" />
    <link rel="stylesheet" href="src/css/theme.css" />
    <link rel="shortcut icon" href="/favicon.png" type="image/x-icon">

    <script type="module" src="src/js/theme.js"></script>
    <script type="module" src="src/js/main.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="site-header">
        <div class="brand">
            <a href="index.html">
                <img src="/rich.svg" alt="Gamer Journal logo" class="logo" />
                <span class="site-title">Gamer Journal</span>
            </a>
        </div>
        <nav>
            <button id="themeToggleBtn" aria-label="Cambiar tema">
                🌗
            </button>
            <button id="menuBtn" aria-expanded="false" aria-controls="primaryNav">☰</button>
            <ul id="primaryNav" class="nav-list">
                <li><a href="index.html">Home</a></li>
                <li><a href="trending.html">Trending</a></li>
                <li><a href="wishlist.html" class="active">Wishlist</a></li>
            </ul>
            <details id="userMenu" class="user-menu" style="display: none;">
                <summary id="avatarBtn" class="avatar-btn" aria-label="User menu">
                    <span class="avatar">👤</span>
                </summary>
                <div id="userDropdown" class="user-dropdown">
                    <div class="user-info">
                        <span id="userNickname" class="user-nickname"></span>
                        <span id="userEmail" class="user-email"></span>
                    </div>
                    <a href="profile.html" class="dropdown-item">Profile</a>
                    <button id="logoutBtn" class="dropdown-item">Logout</button>
                </div>
            </details>
            <a href="login.html" id="loginLink" class="auth-link" style="display: none;">Login</a>
        </nav>
    </header>

    <main class="container">
        <section>
            <h1>Your Wishlist</h1>
            <p>Games you saved for later.</p>
        </section>

        <section id="wishListGrid" class="results" aria-live="polite">
            <!-- favorites -->
        </section>
    </main>

    <!-- Modal for game details (index.html) -->
    <dialog id="modal" class="modal">
        <div class="modal-content">
            <button class="modal-close" aria-label="Close details">&times;</button>
            <div id="modalBody"></div>
        </div>
    </dialog>

    <footer class="site-footer">
        <p>&copy; 2026 Gamer Journal — MOR, México</p>
    </footer>

</body>

</html>
