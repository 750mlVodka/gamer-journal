<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Gamer Journal</title>
    <meta name="description" content="Sign in or create an account on Gamer Journal to save your favorite games and build your wishlist.">

    <!-- Open Graph -->
    <meta property="og:title" content="Login - Gamer Journal">
    <meta property="og:description" content="Sign in to save your favorite games and build your wishlist.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/favicon.png">

    <link rel="canonical" href="/login.html">
    <link rel="stylesheet" href="src/css/normalize.css" />
    <link rel="stylesheet" href="src/css/main.css" />
    <link rel="stylesheet" href="src/css/theme.css" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <script type="module" src="src/js/theme.js"></script>
    <script type="module" src="src/js/login.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;600;700&display=swap"
        rel="stylesheet">
  </head>
  <body>
    <header class="site-header">
      <div class="brand">
            <a href="index.html">
                <img src="/rich.svg" alt="Gamer Journal logo" class="logo" />
                <span class="site-title">Gamer Journal</span>
            </a>
        </div>
      <nav>
        <button id="themeToggleBtn" aria-label="Toggle theme">
            🌗
        </button>
        <ul class="nav-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="trending.html">Trending</a></li>
          <li><a href="wishlist.html">Wishlist</a></li>
        </ul>
      </nav>
    </header>

    <main class="container">
      <section class="auth-section">
        <div class="auth-container">
          <h1>Welcome to Gamer Journal</h1>
          <p class="auth-subtitle">Sign in to save your favorite games</p>
          
          <div id="authMessage" class="auth-message"></div>

          <!-- Tabs -->
          <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Login</button>
            <button class="auth-tab" data-tab="register">Register</button>
          </div>

          <!-- Login Form -->
          <form id="loginForm" class="auth-form active">
            <div class="form-group">
              <label for="loginEmail">Email</label>
              <input type="email" id="loginEmail" placeholder="your@email.com" required />
            </div>
            <div class="form-group">
              <label for="loginPassword">Password</label>
              <input type="password" id="loginPassword" placeholder="••••••••" required />
            </div>
            <button type="submit" class="btn btn--primary btn--full">Sign In</button>
          </form>

          <!-- Register Form -->
          <form id="registerForm" class="auth-form">
            <div class="form-group">
              <label for="registerEmail">Email</label>
              <input type="email" id="registerEmail" placeholder="your@email.com" required />
            </div>
            <div class="form-group">
              <label for="registerPassword">Password</label>
              <input type="password" id="registerPassword" placeholder="••••••••" required />
              <small>Minimum 6 characters</small>
            </div>
            <button type="submit" class="btn btn--primary btn--full">Create Account</button>
          </form>
        </div>
      </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Gamer Journal</p>
    </footer>
  </body>
</html>
